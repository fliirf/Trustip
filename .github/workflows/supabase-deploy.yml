# Deploy Supabase migrations to the linked production project.
#
# Runs `supabase db push` (migrations only — never seed.sql, so production
# stays free of demo data) whenever migrations change on main. Requires three
# GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF   — the production project ref
#   SUPABASE_DB_PASSWORD   — the production database password
name: Deploy Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch: # manual run from the Actions tab

# Never let two migration deploys race against the same database.
concurrency:
  group: supabase-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # ponytail: pinned to the version the migrations were verified against
          # locally; bump deliberately, not via "latest", for money infra.
          version: 2.108.0

      - run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      # Fail loudly if anything about to be applied is unexpected, then apply.
      - run: supabase db push --dry-run
      - run: supabase db push
